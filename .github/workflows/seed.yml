name: Seed Test Data

on:
  workflow_dispatch:
    inputs:
      seeder:
        description: 'Seeder class to run'
        required: true
        default: 'DrawTestSeeder'

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Run seeder on production
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "cd /home/u600930908/domains/lrftaekwondo.com/laravel && php artisan db:seed --class=${{ github.event.inputs.seeder }} --force"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
