name: Deploy to Production

on:
  push:
    branches: [main]

# Minimal permissions — read-only on repo content
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Official GitHub action — pinned to commit SHA (not just tag)
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Official GitHub action — pinned to commit SHA
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets
        run: npm ci && npm run build

      - name: Configure SSH (no third-party action — pure shell)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Deploy files via rsync (pure shell — no third-party action)
        run: |
          rsync -rltgoDzv --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/app/public/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            ./ \
            "$SSH_USER@$SSH_HOST:/home/u600930908/domains/lrftaekwondo.com/laravel/"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Post-deploy commands (pure SSH — no third-party action)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "cd /home/u600930908/domains/lrftaekwondo.com/laravel && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan migrate --force && \
             echo 'Deployed at \$(date)'"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Seed draw test data (runs once — skipped if already seeded)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "cd /home/u600930908/domains/lrftaekwondo.com/laravel && \
             php artisan tinker --execute=\"exit(App\\\Models\\\Event::where('slug','championnat-test-tirages-2025')->exists() ? 0 : 1);\" 2>/dev/null; \
             if [ \$? -ne 0 ]; then \
               php artisan db:seed --class=DrawTestSeeder --force && \
               echo 'Test data seeded.'; \
             else \
               echo 'Test data already present — skipped.'; \
             fi"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
