name: Deploy to Production

on:
  push:
    branches: [main]

# Minimal permissions — read-only on repo content
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Official GitHub action — pinned to commit SHA (not just tag)
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure SSH (no third-party action — pure shell)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Deploy files via rsync (pure shell — no third-party action)
        run: |
          rsync -rltgoDzv --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/app/public/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            ./ \
            "$SSH_USER@$SSH_HOST:/home/u600930908/domains/lrftaekwondo.com/laravel/"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Post-deploy commands (pure SSH — no third-party action)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "cd /home/u600930908/domains/lrftaekwondo.com/laravel && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan optimize:clear && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan migrate --force && \
             cp -rf /home/u600930908/domains/lrftaekwondo.com/laravel/public/build /home/u600930908/domains/lrftaekwondo.com/public_html/ && \
             echo 'Deployed at \$(date)'"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
