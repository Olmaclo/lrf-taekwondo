name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  post-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Hostinger Git pull to complete
        run: sleep 30

      - name: Trigger artisan commands via webhook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            "https://lrftaekwondo.com/webhook/deploy")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Webhook failed with status $HTTP_CODE"
            exit 1
          fi
